<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joker🤡 Blog🦞</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.8.1/github-markdown-light.min.css">

  <style>
    :root {
      --bg: #f2f6ff;
      --card: #ffffff;
      --line: #dde6f5;
      --text: #1f2937;
      --muted: #667085;
      --accent: #3b82f6;
      --accent-2: #6366f1;
      --accent-soft: #eef4ff;
      --danger: #dc2626;
      --tag-bg: #eef2ff;
      --tag-text: #3730a3;
      --ok: #059669;
      --radius: 14px;
      --radius-sm: 10px;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --shadow-soft: 0 4px 14px rgba(15, 23, 42, 0.06);
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      background:
        radial-gradient(1200px 500px at 20% -10%, #e4efff 0%, transparent 65%),
        radial-gradient(1000px 420px at 100% -20%, #e6fff3 0%, transparent 70%),
        linear-gradient(180deg, #f7faff 0%, var(--bg) 100%);
    }

    header {
      min-height: 60px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 16px;
      position: sticky;
      top: 0;
      z-index: 30;
      flex-wrap: wrap;
    }

    .title {
      font-size: 19px;
      font-weight: 800;
      letter-spacing: .2px;
      color: var(--text);
    }

    .hint { color: var(--muted); font-size: 13px; }

    .top-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .cloud-status {
      font-size: 12px;
      color: var(--muted);
      padding: 4px 8px;
      border-radius: 999px;
      background: #f6f8fd;
      border: 1px solid #e4eaf7;
    }
    .cloud-status.ok {
      color: var(--ok);
      background: #ecfdf5;
      border-color: #b7efd8;
    }

    .layout {
      height: calc(100vh - 60px);
      display: grid;
      grid-template-columns: 320px 1fr 1fr;
      gap: 12px;
      padding: 12px;
    }

    .panel {
      background: color-mix(in srgb, var(--card) 92%, #edf3ff 8%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .panel-head {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      background: linear-gradient(180deg, #fff 0%, #f9fbff 100%);
    }

    .toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    .btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 6px 11px;
      font-size: 13px;
      cursor: pointer;
      transition: all .16s ease;
      box-shadow: var(--shadow-soft);
    }
    .btn:hover {
      border-color: color-mix(in srgb, var(--accent) 65%, white 35%);
      color: var(--accent);
      transform: translateY(-1px);
    }
    .btn:active { transform: translateY(0); }
    .btn:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(59,130,246,.22);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      border-color: transparent;
    }
    .btn-primary:hover { color: #fff; filter: brightness(1.03); }
    .btn-danger:hover { border-color: var(--danger); color: var(--danger); }

    .search-wrap { padding: 10px 10px 0; }

    .search-tools {
      display: grid;
      grid-template-columns: 1fr 170px;
      gap: 8px;
    }

    select {
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      font-size: 13px;
      outline: none;
      color: var(--text);
      background: #fff;
      cursor: pointer;
    }
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,.15);
    }

    input[type="text"], input[type="search"] {
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      font-size: 13px;
      min-width: 160px;
      outline: none;
      width: 100%;
      color: var(--text);
      background: #fff;
      transition: all .16s ease;
    }
    input[type="text"]:focus, input[type="search"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,.15);
    }

    .filter-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      max-height: 86px;
      overflow: auto;
    }

    .chip {
      border: 1px solid #dbe4ff;
      background: var(--tag-bg);
      color: var(--tag-text);
      border-radius: 999px;
      padding: 2px 9px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: all .16s ease;
    }
    .chip:hover { transform: translateY(-1px); }
    .chip.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      border-color: transparent;
    }

    .articles { overflow: auto; padding: 8px; }

    .article-item {
      width: 100%;
      text-align: left;
      border: 1px solid #edf1f8;
      background: #fff;
      padding: 10px;
      border-radius: 12px;
      cursor: pointer;
      margin-bottom: 8px;
      transition: all .16s ease;
      box-shadow: 0 2px 10px rgba(15,23,42,.04);
    }
    .article-item:hover {
      border-color: #cfdaf0;
      background: #fbfdff;
      transform: translateY(-1px);
    }
    .article-item.active {
      border-color: #bfd2ff;
      background: var(--accent-soft);
      box-shadow: 0 6px 16px rgba(59,130,246,.14);
    }

    .article-title {
      font-size: 14px;
      font-weight: 650;
      line-height: 1.4;
      margin-bottom: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .article-meta { font-size: 12px; color: var(--muted); margin-bottom: 6px; }

    .article-tags {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-top: 2px;
    }
    .article-tag {
      font-size: 11px;
      color: var(--tag-text);
      background: var(--tag-bg);
      border: 1px solid #dbe4ff;
      border-radius: 999px;
      padding: 1px 7px;
    }

    .editor-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      width: 100%;
    }

    .tags-input-wrap {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      width: 100%;
      margin-top: 6px;
    }

    textarea {
      width: 100%;
      height: 100%;
      border: 0;
      outline: none;
      resize: none;
      padding: 14px;
      font-size: 15px;
      line-height: 1.68;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
        "Liberation Mono", "Courier New", monospace;
      color: var(--text);
      background:
        linear-gradient(180deg, #fff 0%, #fcfdff 100%);
    }

    .preview-wrap {
      height: 100%;
      overflow: auto;
      padding: 18px;
      background: linear-gradient(180deg, #fafdff 0%, #f6f9ff 100%);
    }
    .markdown-body {
      max-width: 860px;
      margin: 0 auto;
      background: #fff;
      padding: 22px;
      border-radius: 12px;
      border: 1px solid #e9edf6;
      box-shadow: 0 8px 22px rgba(15,23,42,.06);
    }

    .empty { color: var(--muted); padding: 16px; font-size: 13px; }

    #expandListFab {
      position: fixed;
      left: 14px;
      bottom: 14px;
      z-index: 60;
      display: none;
    }

    body.list-collapsed #expandListFab {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    *::-webkit-scrollbar { width: 10px; height: 10px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb {
      background: #d5dfee;
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: content-box;
    }
    *::-webkit-scrollbar-thumb:hover { background: #bdcae2; background-clip: content-box; }

    @media (max-width: 1240px) {
      .layout { grid-template-columns: 280px 1fr 1fr; }
    }

    body.list-collapsed .layout {
      grid-template-columns: 1fr 1fr;
    }

    body.list-collapsed .panel-list {
      display: none;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
        height: auto;
        min-height: calc(100vh - 60px);
      }
      .panel { min-height: 42vh; }
      .title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="title">Joker🤡 Blog🦞</div>
    <div class="top-right">
      <button class="btn" id="expandListBtn" style="display:none">☰ 展开文章列表</button>
      <span class="cloud-status" id="cloudStatus">未连接云同步</span>
      <button class="btn" id="loginBtn">GitHub 登录同步</button>
      <button class="btn" id="logoutBtn" style="display:none">退出登录</button>
      <span class="hint" id="saveStatus">已自动保存</span>
    </div>
  </header>

  <main class="layout">
    <section class="panel panel-list">
      <div class="panel-head">
        <span>文章列表</span>
        <div class="toolbar">
          <button class="btn" id="toggleListBtn" title="折叠/展开文章列表">⟨ 收起</button>
          <button class="btn btn-primary" id="newArticleBtn">+ 新建</button>
          <button class="btn" id="exportAllBtn">导出全部 ZIP</button>
        </div>
      </div>

      <div class="search-wrap">
        <div class="search-tools">
          <input id="searchInput" type="search" placeholder="搜索标题 / 内容 / 标签" />
          <select id="sortSelect" title="文章排序方式">
            <option value="date_desc">按日期（最新优先）</option>
            <option value="date_asc">按日期（最早优先）</option>
            <option value="name_asc">按名称（A-Z）</option>
            <option value="name_desc">按名称（Z-A）</option>
          </select>
        </div>
      </div>

      <div class="filter-tags" id="tagFilterWrap"></div>
      <div class="articles" id="articleList"></div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div class="editor-toolbar">
          <span>Markdown 编辑区</span>
          <input id="titleInput" type="text" placeholder="文章标题" style="max-width: 220px;" />
          <button class="btn" id="renameBtn">改名</button>
          <button class="btn" id="exportBtn">导出 .md</button>
          <button class="btn" id="importBtn">导入 .md</button>
          <button class="btn" id="uploadImageBtn" title="上传图片到 Supabase Storage 并插入 Markdown">上传图片</button>
          <button class="btn btn-danger" id="deleteBtn">删除</button>
          <input id="importFileInput" type="file" accept=".md,text/markdown" style="display:none" />
          <input id="imageFileInput" type="file" accept="image/*" style="display:none" />
        </div>

        <div class="tags-input-wrap">
          <input id="tagsInput" type="text" placeholder="标签（用逗号分隔，如：学习,生活,AI）" />
          <button class="btn" id="saveTagsBtn">保存标签</button>
        </div>
      </div>

      <textarea id="editor" placeholder="# 今天记录\n\n- 学了什么\n- 想了什么\n- 明天做什么\n"></textarea>
    </section>

    <section class="panel">
      <div class="panel-head">
        <span>实时预览区（GitHub 风格）</span>
      </div>
      <div class="preview-wrap">
        <article id="preview" class="markdown-body"></article>
      </div>
    </section>
  </main>

  <button class="btn btn-primary" id="expandListFab" title="展开文章列表">☰ 展开文章列表</button>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // 你的 Supabase 配置（可公开放前端，需配合 RLS）
    const SUPABASE_URL = 'https://gitfkpmvofvjfdqikkxa.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_jpVST_WYEJW6RiEb2CPK1g_NOpWFeVj';

    const STORAGE_KEY = 'my_blog_articles_v4';
    const LEGACY_KEYS = ['my_blog_articles_v3', 'my_blog_articles_v2', 'my_blog_markdown_content_v1'];

    const articleListEl = document.getElementById('articleList');
    const tagFilterWrap = document.getElementById('tagFilterWrap');
    const toggleListBtn = document.getElementById('toggleListBtn');
    const expandListBtn = document.getElementById('expandListBtn');
    const expandListFab = document.getElementById('expandListFab');
    const newArticleBtn = document.getElementById('newArticleBtn');
    const exportAllBtn = document.getElementById('exportAllBtn');
    const searchInput = document.getElementById('searchInput');
    const sortSelect = document.getElementById('sortSelect');

    const renameBtn = document.getElementById('renameBtn');
    const exportBtn = document.getElementById('exportBtn');
    const importBtn = document.getElementById('importBtn');
    const uploadImageBtn = document.getElementById('uploadImageBtn');
    const importFileInput = document.getElementById('importFileInput');
    const imageFileInput = document.getElementById('imageFileInput');
    const deleteBtn = document.getElementById('deleteBtn');
    const titleInput = document.getElementById('titleInput');
    const tagsInput = document.getElementById('tagsInput');
    const saveTagsBtn = document.getElementById('saveTagsBtn');

    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');
    const saveStatus = document.getElementById('saveStatus');

    const cloudStatus = document.getElementById('cloudStatus');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');

    marked.setOptions({ breaks: true, gfm: true, headerIds: true, mangle: false });

    let state = {
      activeId: null,
      search: '',
      selectedTag: '',
      listCollapsed: false,
      sortBy: 'date_desc',
      articles: []
    };

    let supabaseClient = null;
    let currentUser = null;
    let cloudPushTimer = null;
    let suppressCloudPush = false;
    let imageUploading = false;

    const IMAGE_BUCKET = 'blog-images';

    function now() { return new Date().toISOString(); }
    function newId() {
      return (window.crypto && crypto.randomUUID)
        ? crypto.randomUUID()
        : 'a_' + Math.random().toString(36).slice(2, 11);
    }

    function formatTime(iso) {
      const d = new Date(iso);
      return d.toLocaleString();
    }

    function defaultContent() {
      return `# 欢迎使用我的 Blog\n\n这是一个用于记录 **生活** 和 **学习** 的小站。\n\n## 今日计划\n- [ ] 阅读 30 分钟\n- [ ] 复盘今天收获\n- [ ] 写一段总结\n\n> 持续记录，向内求，慢慢变强。`;
    }

    function activeArticle() {
      return state.articles.find(a => a.id === state.activeId) || null;
    }

    function setStatus(text) { saveStatus.textContent = text; }

    function setCloudStatus(text, ok = false) {
      cloudStatus.textContent = text;
      cloudStatus.classList.toggle('ok', ok);
    }

    function applyListCollapsedUI() {
      const collapsed = Boolean(state.listCollapsed);
      document.body.classList.toggle('list-collapsed', collapsed);
      if (toggleListBtn) {
        toggleListBtn.textContent = collapsed ? '⟩ 展开' : '⟨ 收起';
      }
      if (expandListBtn) {
        expandListBtn.style.display = collapsed ? '' : 'none';
      }
    }

    function setListCollapsed(collapsed) {
      state.listCollapsed = Boolean(collapsed);
      applyListCollapsedUI();
      saveState();
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      setStatus('已自动保存 · ' + new Date().toLocaleTimeString());
      scheduleCloudPush();
    }

    function renderPreview(md) {
      preview.innerHTML = marked.parse(md || '');
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function sanitizeFilename(name) {
      const base = (name || 'untitled')
        .replace(/[\\/:*?"<>|]+/g, '_')
        .replace(/\s+/g, ' ')
        .trim();
      return (base || 'untitled').slice(0, 80);
    }

    function getFileExt(name, fallback = 'png') {
      const m = String(name || '').toLowerCase().match(/\.([a-z0-9]+)$/);
      return m ? m[1] : fallback;
    }

    function insertTextAtCursor(el, text) {
      const start = el.selectionStart ?? el.value.length;
      const end = el.selectionEnd ?? el.value.length;
      const before = el.value.slice(0, start);
      const after = el.value.slice(end);
      el.value = before + text + after;
      const next = start + text.length;
      el.selectionStart = el.selectionEnd = next;
      el.focus();
    }

    function uniqueImagePath(file) {
      const uid = currentUser?.id || 'anonymous';
      const articleId = state.activeId || 'general';
      const datePart = new Date().toISOString().slice(0, 10);
      const ext = getFileExt(file?.name || '', 'png');
      const rand = Math.random().toString(36).slice(2, 10);
      return `${uid}/${datePart}/${articleId}/${Date.now()}_${rand}.${ext}`;
    }

    async function uploadImageAndInsert(file, source = 'upload') {
      const a = activeArticle();
      if (!a) {
        alert('请先选择或新建一篇文章，再插入图片');
        return;
      }
      if (!file) return;
      if (!supabaseClient || !currentUser) {
        alert('请先 GitHub 登录，再上传图片到云端');
        return;
      }
      if (!String(file.type || '').startsWith('image/')) {
        alert('仅支持图片文件');
        return;
      }
      if (imageUploading) {
        setStatus('已有图片在上传，请稍候...');
        return;
      }

      imageUploading = true;
      const oldBtnText = uploadImageBtn ? uploadImageBtn.textContent : '';
      if (uploadImageBtn) {
        uploadImageBtn.disabled = true;
        uploadImageBtn.textContent = '上传中...';
      }

      try {
        setStatus(source === 'paste' ? '正在上传粘贴图片...' : '正在上传图片...');
        const path = uniqueImagePath(file);
        const { error: upErr } = await supabaseClient.storage
          .from(IMAGE_BUCKET)
          .upload(path, file, {
            contentType: file.type || 'image/png',
            upsert: false
          });

        if (upErr) {
          throw new Error(upErr.message || '上传失败');
        }

        const { data: pub } = supabaseClient.storage.from(IMAGE_BUCKET).getPublicUrl(path);
        const url = pub?.publicUrl;
        if (!url) {
          throw new Error('无法获取图片地址，请检查 bucket 是否公开可读');
        }

        const alt = sanitizeFilename(file.name || 'image');
        const md = `\n![${alt}](${url})\n`;
        insertTextAtCursor(editor, md);

        a.content = editor.value;
        a.updatedAt = now();
        renderPreview(a.content);
        renderArticleList();
        saveState();
        setStatus('图片上传成功并已插入 · ' + new Date().toLocaleTimeString());
      } catch (err) {
        console.error(err);
        alert(`图片上传失败：${err?.message || err}\n\n请确认：\n1) 已登录 GitHub\n2) Supabase Storage 存在 bucket: ${IMAGE_BUCKET}\n3) 该 bucket 允许读取（Public）或已配置可访问策略`);
        setStatus('图片上传失败');
      } finally {
        imageUploading = false;
        if (uploadImageBtn) {
          uploadImageBtn.disabled = false;
          uploadImageBtn.textContent = oldBtnText || '上传图片';
        }
      }
    }

    function parseTags(raw) {
      return Array.from(new Set((raw || '')
        .split(',')
        .map(s => s.trim())
        .filter(Boolean)));
    }

    function allTags() {
      const set = new Set();
      state.articles.forEach(a => (a.tags || []).forEach(t => set.add(t)));
      return Array.from(set).sort((a, b) => a.localeCompare(b, 'zh-CN'));
    }

    function filteredArticles() {
      const q = (state.search || '').trim().toLowerCase();
      const selectedTag = state.selectedTag;

      const list = [...state.articles];
      const sortBy = state.sortBy || 'date_desc';

      if (sortBy === 'date_asc') {
        list.sort((a, b) => new Date(a.updatedAt) - new Date(b.updatedAt));
      } else if (sortBy === 'name_asc') {
        list.sort((a, b) => (a.title || '').localeCompare((b.title || ''), 'zh-CN'));
      } else if (sortBy === 'name_desc') {
        list.sort((a, b) => (b.title || '').localeCompare((a.title || ''), 'zh-CN'));
      } else {
        list.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
      }

      return list.filter(a => {
        const tags = a.tags || [];
        if (selectedTag && !tags.includes(selectedTag)) return false;
        if (!q) return true;

        const haystack = [a.title || '', a.content || '', tags.join(' ')].join('\n').toLowerCase();
        return haystack.includes(q);
      });
    }

    function renderTagFilter() {
      const tags = allTags();
      tagFilterWrap.innerHTML = '';

      const allChip = document.createElement('button');
      allChip.className = 'chip' + (!state.selectedTag ? ' active' : '');
      allChip.textContent = '全部';
      allChip.addEventListener('click', () => {
        state.selectedTag = '';
        renderTagFilter();
        renderArticleList();
        saveState();
      });
      tagFilterWrap.appendChild(allChip);

      tags.forEach(tag => {
        const chip = document.createElement('button');
        chip.className = 'chip' + (state.selectedTag === tag ? ' active' : '');
        chip.textContent = tag;
        chip.addEventListener('click', () => {
          state.selectedTag = state.selectedTag === tag ? '' : tag;
          renderTagFilter();
          renderArticleList();
          saveState();
        });
        tagFilterWrap.appendChild(chip);
      });
    }

    function renderArticleList() {
      articleListEl.innerHTML = '';
      const list = filteredArticles();

      if (!list.length) {
        articleListEl.innerHTML = '<div class="empty">没有匹配的文章，试试调整搜索词或标签。</div>';
        return;
      }

      list.forEach(article => {
        const btn = document.createElement('button');
        btn.className = 'article-item' + (article.id === state.activeId ? ' active' : '');
        const tagsHtml = (article.tags || []).map(t => `<span class="article-tag">${escapeHtml(t)}</span>`).join('');

        btn.innerHTML = `
          <div class="article-title">${escapeHtml(article.title || '未命名文章')}</div>
          <div class="article-meta">更新于 ${formatTime(article.updatedAt)}</div>
          <div class="article-tags">${tagsHtml || ''}</div>
        `;

        btn.addEventListener('click', () => switchArticle(article.id));
        articleListEl.appendChild(btn);
      });
    }

    function renderEditor() {
      const a = activeArticle();
      if (!a) {
        titleInput.value = '';
        tagsInput.value = '';
        editor.value = '';
        renderPreview('');
        return;
      }

      titleInput.value = a.title || '';
      tagsInput.value = (a.tags || []).join(', ');
      editor.value = a.content || '';
      renderPreview(a.content || '');
    }

    function switchArticle(id) {
      state.activeId = id;
      renderArticleList();
      renderEditor();
      saveState();
    }

    function createArticle(title = '新文章') {
      const t = now();
      const article = {
        id: newId(),
        title,
        tags: [],
        content: state.articles.length ? '' : defaultContent(),
        createdAt: t,
        updatedAt: t,
        version: 1,
        _existsInCloud: false
      };
      state.articles.push(article);
      state.activeId = article.id;
      renderTagFilter();
      renderArticleList();
      renderEditor();
      saveState();
    }

    async function deleteActiveArticle() {
      const a = activeArticle();
      if (!a) return;
      if (!confirm(`确认删除文章《${a.title || '未命名文章'}》吗？此操作不可撤销。`)) return;

      state.articles = state.articles.filter(x => x.id !== a.id);
      state.activeId = state.articles[0]?.id || null;

      renderTagFilter();
      renderArticleList();
      renderEditor();
      saveState();

      if (supabaseClient && currentUser) {
        await supabaseClient.from('blog_articles').delete().eq('id', a.id).eq('user_id', currentUser.id);
      }
    }

    function renameActiveArticle() {
      const a = activeArticle();
      if (!a) return;

      const t = (titleInput.value || '').trim();
      if (!t) {
        alert('标题不能为空');
        titleInput.focus();
        return;
      }

      a.title = t;
      a.updatedAt = now();
      renderArticleList();
      saveState();
    }

    function saveTagsForActiveArticle() {
      const a = activeArticle();
      if (!a) return;
      a.tags = parseTags(tagsInput.value);
      a.updatedAt = now();
      renderTagFilter();
      renderArticleList();
      saveState();
      setStatus('标签已保存 · ' + new Date().toLocaleTimeString());
    }

    function exportActiveArticleAsMarkdown() {
      const a = activeArticle();
      if (!a) {
        alert('当前没有可导出的文章');
        return;
      }

      const header = (a.tags && a.tags.length)
        ? `<!-- tags: ${a.tags.join(', ')} -->\n\n`
        : '';
      const content = header + (a.content || '');
      const blob = new Blob([content], { type: 'text/markdown;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `${sanitizeFilename(a.title)}.md`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
      setStatus('导出成功 · ' + new Date().toLocaleTimeString());
    }

    async function exportAllAsZip() {
      if (!state.articles.length) {
        alert('没有文章可导出');
        return;
      }

      if (!window.JSZip) {
        alert('ZIP 组件加载失败，请刷新重试');
        return;
      }

      setStatus('正在打包 ZIP...');
      const zip = new JSZip();

      state.articles.forEach(a => {
        const tagsHeader = (a.tags && a.tags.length) ? `<!-- tags: ${a.tags.join(', ')} -->\n` : '';
        const metaHeader = `<!-- created: ${a.createdAt} | updated: ${a.updatedAt} -->\n`;
        const content = `${metaHeader}${tagsHeader}\n${a.content || ''}`;
        zip.file(`${sanitizeFilename(a.title || 'untitled')}.md`, content);
      });

      const blob = await zip.generateAsync({ type: 'blob' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      link.href = url;
      link.download = `my-blog-export-${new Date().toISOString().slice(0, 10)}.zip`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
      setStatus('已导出全部 ZIP · ' + new Date().toLocaleTimeString());
    }

    function importMarkdownToActiveArticle(file) {
      const a = activeArticle();
      if (!a) {
        alert('当前没有可导入的文章');
        return;
      }
      if (!file) return;

      const reader = new FileReader();
      reader.onload = () => {
        const text = String(reader.result || '');
        a.content = text;
        a.updatedAt = now();

        const currentTitle = (a.title || '').trim();
        if (!currentTitle || currentTitle === '新文章' || currentTitle === '未命名文章') {
          const name = file.name.replace(/\.md$/i, '').trim();
          if (name) a.title = name;
        }

        renderArticleList();
        renderEditor();
        saveState();
        setStatus('导入成功 · ' + new Date().toLocaleTimeString());
      };
      reader.onerror = () => alert('导入失败，请重试');
      reader.readAsText(file, 'utf-8');
    }

    function importMarkdownAsNewArticle(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        const text = String(reader.result || '');
        const titleFromFile = file.name.replace(/\.md$/i, '').trim() || '导入文章';
        const t = now();
        const article = {
          id: newId(),
          title: titleFromFile,
          tags: [],
          content: text,
          createdAt: t,
          updatedAt: t,
          version: 1,
          _existsInCloud: false
        };
        state.articles.push(article);
        state.activeId = article.id;
        renderTagFilter();
        renderArticleList();
        renderEditor();
        saveState();
        setStatus('已导入为新文章 · ' + new Date().toLocaleTimeString());
      };
      reader.onerror = () => alert('导入失败，请重试');
      reader.readAsText(file, 'utf-8');
    }

    function migrateLegacyDataIfNeeded() {
      const rawV4 = localStorage.getItem(STORAGE_KEY);
      if (rawV4) return;

      for (const key of LEGACY_KEYS) {
        const raw = localStorage.getItem(key);
        if (!raw) continue;

        try {
          if (key === 'my_blog_markdown_content_v1') {
            const t = now();
            const article = {
              id: newId(),
              title: '迁移文章',
              tags: [],
              content: raw,
              createdAt: t,
              updatedAt: t,
              version: 1,
              _existsInCloud: false
            };
            state = { activeId: article.id, search: '', selectedTag: '', listCollapsed: false, sortBy: 'date_desc', articles: [article] };
            saveState();
            return;
          }

          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed.articles)) {
            state = {
              activeId: parsed.activeId || parsed.articles[0]?.id || null,
              search: parsed.search || '',
              selectedTag: parsed.selectedTag || '',
              listCollapsed: Boolean(parsed.listCollapsed),
              sortBy: parsed.sortBy || 'date_desc',
              articles: parsed.articles.map(a => ({
                id: a.id || newId(),
                title: a.title || '未命名文章',
                tags: Array.isArray(a.tags) ? a.tags : [],
                content: a.content || '',
                createdAt: a.createdAt || now(),
                updatedAt: a.updatedAt || now(),
                version: Number.isFinite(Number(a.version)) ? Number(a.version) : 1,
                _existsInCloud: Boolean(a._existsInCloud)
              }))
            };
            saveState();
            return;
          }
        } catch (_) {}
      }
    }

    async function initSupabaseAuth() {
      if (!window.supabase || !SUPABASE_URL || !SUPABASE_ANON_KEY) {
        setCloudStatus('云同步未配置', false);
        return;
      }

      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const { data: { session } } = await supabaseClient.auth.getSession();
      currentUser = session?.user || null;
      updateAuthUI();

      if (currentUser) {
        await pullFromCloudAndMerge();
      }

      supabaseClient.auth.onAuthStateChange(async (_event, sessionNow) => {
        currentUser = sessionNow?.user || null;
        updateAuthUI();
        if (currentUser) {
          await pullFromCloudAndMerge();
        }
      });
    }

    function updateAuthUI() {
      if (currentUser) {
        loginBtn.style.display = 'none';
        logoutBtn.style.display = '';
        setCloudStatus('云同步已连接', true);
      } else {
        loginBtn.style.display = '';
        logoutBtn.style.display = 'none';
        setCloudStatus('未连接云同步', false);
      }
    }

    function mergeArticles(localArticles, cloudArticles) {
      const map = new Map();
      [...localArticles, ...cloudArticles].forEach(a => {
        const old = map.get(a.id);
        if (!old) {
          map.set(a.id, a);
          return;
        }

        const oldVersion = Number(old.version || 1);
        const newVersion = Number(a.version || 1);

        if (newVersion !== oldVersion) {
          map.set(a.id, newVersion > oldVersion ? a : old);
          return;
        }

        const oldTime = new Date(old.updatedAt).getTime();
        const newTime = new Date(a.updatedAt).getTime();
        map.set(a.id, newTime >= oldTime ? a : old);
      });
      return [...map.values()].sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
    }

    function showConflictPrompt() {
      const msg = '检测到云端版本已更新（另一端可能刚修改）。\n请选择：\nA=覆盖云端（以当前本地为准）\nB=加载云端最新（放弃当前本地改动）\nC=取消（我手动合并）';
      const pick = prompt(msg, 'C');
      return (pick || 'C').trim().toUpperCase();
    }

    async function getCloudArticleById(id) {
      if (!supabaseClient || !currentUser) return null;
      const { data, error } = await supabaseClient
        .from('blog_articles')
        .select('id,title,content,tags,created_at,updated_at,version')
        .eq('id', id)
        .eq('user_id', currentUser.id)
        .maybeSingle();
      if (error) {
        console.error(error);
        return null;
      }
      if (!data) return null;
      return {
        id: data.id,
        title: data.title || '未命名文章',
        content: data.content || '',
        tags: Array.isArray(data.tags) ? data.tags : [],
        createdAt: data.created_at || now(),
        updatedAt: data.updated_at || now(),
        version: Number(data.version || 1),
        _existsInCloud: true
      };
    }

    async function forceOverwriteCloudArticle(localArticle) {
      const remote = await getCloudArticleById(localArticle.id);
      const nextVersion = (remote?.version || localArticle.version || 1) + 1;
      const updatedAt = now();

      const { data, error } = await supabaseClient
        .from('blog_articles')
        .upsert({
          id: localArticle.id,
          user_id: currentUser.id,
          title: localArticle.title || '',
          content: localArticle.content || '',
          tags: Array.isArray(localArticle.tags) ? localArticle.tags : [],
          created_at: localArticle.createdAt || updatedAt,
          updated_at: updatedAt,
          version: nextVersion
        }, { onConflict: 'id' })
        .select('version,updated_at')
        .single();

      if (error) {
        console.error(error);
        return false;
      }

      localArticle.version = Number(data.version || nextVersion);
      localArticle.updatedAt = data.updated_at || updatedAt;
      localArticle._existsInCloud = true;
      return true;
    }

    async function saveOneArticleWithLock(article, { conflictPolicy = 'ask' } = {}) {
      if (!supabaseClient || !currentUser) return { ok: false, reason: 'offline' };

      if (!article._existsInCloud) {
        const { data, error } = await supabaseClient
          .from('blog_articles')
          .insert({
            id: article.id,
            user_id: currentUser.id,
            title: article.title || '',
            content: article.content || '',
            tags: Array.isArray(article.tags) ? article.tags : [],
            created_at: article.createdAt || now(),
            updated_at: article.updatedAt || now(),
            version: Number(article.version || 1)
          })
          .select('version,updated_at')
          .single();

        if (error) {
          if (error.code === '23505') {
            article._existsInCloud = true;
            return { conflict: true, reason: 'already_exists' };
          }
          return { ok: false, error };
        }

        article.version = Number(data.version || 1);
        article.updatedAt = data.updated_at || article.updatedAt || now();
        article._existsInCloud = true;
        return { ok: true };
      }

      const expectedVersion = Number(article.version || 1);
      const proposedVersion = expectedVersion + 1;
      const proposedUpdatedAt = now();

      const { data, error } = await supabaseClient
        .from('blog_articles')
        .update({
          title: article.title || '',
          content: article.content || '',
          tags: Array.isArray(article.tags) ? article.tags : [],
          updated_at: proposedUpdatedAt,
          version: proposedVersion
        })
        .eq('id', article.id)
        .eq('user_id', currentUser.id)
        .eq('version', expectedVersion)
        .select('version,updated_at')
        .maybeSingle();

      if (error) return { ok: false, error };

      if (!data) {
        if (conflictPolicy === 'overwrite') {
          const ok = await forceOverwriteCloudArticle(article);
          return ok ? { ok: true, forced: true } : { ok: false, reason: 'force_failed' };
        }
        if (conflictPolicy === 'load_remote') {
          const remote = await getCloudArticleById(article.id);
          if (remote) {
            Object.assign(article, remote);
            return { conflict: true, resolvedBy: 'remote_loaded' };
          }
          return { ok: false, reason: 'remote_missing' };
        }
        return { conflict: true, reason: 'version_mismatch' };
      }

      article.version = Number(data.version || proposedVersion);
      article.updatedAt = data.updated_at || proposedUpdatedAt;
      article._existsInCloud = true;
      return { ok: true };
    }

    async function pullFromCloudAndMerge() {
      if (!supabaseClient || !currentUser) return;
      setCloudStatus('云端同步中...', false);

      const { data, error } = await supabaseClient
        .from('blog_articles')
        .select('id,title,content,tags,created_at,updated_at,version')
        .eq('user_id', currentUser.id)
        .order('updated_at', { ascending: false });

      if (error) {
        setCloudStatus('同步失败，请检查表和RLS', false);
        console.error(error);
        return;
      }

      const cloud = (data || []).map(r => ({
        id: r.id,
        title: r.title || '未命名文章',
        content: r.content || '',
        tags: Array.isArray(r.tags) ? r.tags : [],
        createdAt: r.created_at || now(),
        updatedAt: r.updated_at || now(),
        version: Number(r.version || 1),
        _existsInCloud: true
      }));

      const merged = mergeArticles(state.articles, cloud).map(a => {
        const inCloud = cloud.find(c => c.id === a.id);
        return {
          ...a,
          version: Number(a.version || 1),
          _existsInCloud: Boolean(inCloud || a._existsInCloud)
        };
      });

      suppressCloudPush = true;
      state.articles = merged;
      if (!state.activeId || !state.articles.find(a => a.id === state.activeId)) {
        state.activeId = state.articles[0]?.id || null;
      }
      renderTagFilter();
      renderArticleList();
      renderEditor();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      suppressCloudPush = false;

      setCloudStatus('云同步已连接', true);
      scheduleCloudPush();
    }

    function scheduleCloudPush() {
      if (suppressCloudPush || !supabaseClient || !currentUser) return;
      clearTimeout(cloudPushTimer);
      cloudPushTimer = setTimeout(pushAllToCloud, 1200);
    }

    async function pushAllToCloud() {
      if (!supabaseClient || !currentUser) return;
      if (!state.articles.length) return;

      for (const article of state.articles) {
        const result = await saveOneArticleWithLock(article);

        if (result?.conflict) {
          const action = showConflictPrompt();

          if (action === 'A') {
            const forced = await saveOneArticleWithLock(article, { conflictPolicy: 'overwrite' });
            if (!forced?.ok) {
              setCloudStatus('冲突覆盖失败', false);
              console.error(forced);
              return;
            }
            setStatus('检测到冲突：已按本地覆盖云端');
          } else if (action === 'B') {
            const loaded = await saveOneArticleWithLock(article, { conflictPolicy: 'load_remote' });
            if (loaded?.resolvedBy === 'remote_loaded') {
              renderTagFilter();
              renderArticleList();
              renderEditor();
              localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
              setStatus('检测到冲突：已载入云端最新');
            } else {
              setCloudStatus('冲突处理失败', false);
              console.error(loaded);
              return;
            }
          } else {
            setCloudStatus('检测到冲突（已暂停自动同步）', false);
            alert('检测到冲突，已暂停本次自动同步。请手动合并后再继续编辑。');
            return;
          }
        } else if (!result?.ok) {
          setCloudStatus('云同步失败，请检查RLS', false);
          console.error(result?.error || result);
          return;
        }
      }

      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      setCloudStatus('云同步已连接', true);
    }

    async function signInWithGithub() {
      if (!supabaseClient) return;
      const redirectTo = window.location.origin + window.location.pathname;
      const { error } = await supabaseClient.auth.signInWithOAuth({
        provider: 'github',
        options: { redirectTo }
      });
      if (error) alert('登录失败：' + error.message);
    }

    async function signOut() {
      if (!supabaseClient) return;
      const { error } = await supabaseClient.auth.signOut();
      if (error) alert('退出失败：' + error.message);
      else {
        currentUser = null;
        updateAuthUI();
      }
    }

    function init() {
      migrateLegacyDataIfNeeded();

      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        try {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed.articles)) {
            state = {
              activeId: parsed.activeId || null,
              search: parsed.search || '',
              selectedTag: parsed.selectedTag || '',
              listCollapsed: Boolean(parsed.listCollapsed),
              sortBy: parsed.sortBy || 'date_desc',
              articles: parsed.articles.map(a => ({
                id: a.id || newId(),
                title: a.title || '未命名文章',
                content: a.content || '',
                tags: Array.isArray(a.tags) ? a.tags : [],
                createdAt: a.createdAt || now(),
                updatedAt: a.updatedAt || now(),
                version: Number.isFinite(Number(a.version)) ? Number(a.version) : 1,
                _existsInCloud: Boolean(a._existsInCloud)
              }))
            };
          }
        } catch (_) {}
      }

      if (!state.articles.length) {
        createArticle('我的第一篇');
      } else {
        if (!state.activeId || !state.articles.find(a => a.id === state.activeId)) {
          state.activeId = state.articles[0].id;
        }
        searchInput.value = state.search || '';
        sortSelect.value = state.sortBy || 'date_desc';
        applyListCollapsedUI();
        renderTagFilter();
        renderArticleList();
        renderEditor();
        saveState();
      }

      applyListCollapsedUI();
      initSupabaseAuth();
    }

    let debounceTimer = null;
    editor.addEventListener('input', () => {
      const a = activeArticle();
      if (!a) return;

      a.content = editor.value;
      a.updatedAt = now();
      renderPreview(a.content);
      setStatus('输入中...');

      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        renderArticleList();
        saveState();
      }, 260);
    });

    searchInput.addEventListener('input', () => {
      state.search = searchInput.value || '';
      renderArticleList();
      saveState();
    });

    sortSelect?.addEventListener('change', () => {
      state.sortBy = sortSelect.value || 'date_desc';
      renderArticleList();
      saveState();
    });

    toggleListBtn?.addEventListener('click', () => {
      setListCollapsed(!state.listCollapsed);
    });

    expandListBtn?.addEventListener('click', () => {
      setListCollapsed(false);
    });

    expandListFab?.addEventListener('click', () => {
      setListCollapsed(false);
    });

    newArticleBtn.addEventListener('click', () => {
      const title = prompt('新文章标题（可留空）', '新文章');
      createArticle((title || '新文章').trim() || '新文章');
    });

    renameBtn.addEventListener('click', renameActiveArticle);
    saveTagsBtn.addEventListener('click', saveTagsForActiveArticle);
    exportBtn.addEventListener('click', exportActiveArticleAsMarkdown);
    exportAllBtn.addEventListener('click', exportAllAsZip);

    importBtn.addEventListener('click', () => {
      importFileInput.value = '';
      importFileInput.click();
    });

    uploadImageBtn?.addEventListener('click', () => {
      imageFileInput.value = '';
      imageFileInput.click();
    });

    imageFileInput?.addEventListener('change', async () => {
      const file = imageFileInput.files && imageFileInput.files[0];
      if (!file) return;
      await uploadImageAndInsert(file, 'upload');
    });

    editor.addEventListener('paste', async (e) => {
      const items = e.clipboardData?.items || [];
      for (const item of items) {
        if (item.kind === 'file' && String(item.type || '').startsWith('image/')) {
          e.preventDefault();
          const file = item.getAsFile();
          if (file) {
            await uploadImageAndInsert(file, 'paste');
          }
          return;
        }
      }
    });

    importFileInput.addEventListener('change', () => {
      const file = importFileInput.files && importFileInput.files[0];
      if (!file) return;
      const mode = prompt('导入方式：\nA = 覆盖当前文章\nB = 导入为新文章', 'B');
      const pick = (mode || 'B').trim().toUpperCase();
      if (pick === 'A') importMarkdownToActiveArticle(file);
      else importMarkdownAsNewArticle(file);
    });

    deleteBtn.addEventListener('click', deleteActiveArticle);
    loginBtn.addEventListener('click', signInWithGithub);
    logoutBtn.addEventListener('click', signOut);

    init();
  </script>
</body>
